name: 更新榜單並部署

on:
  # 每天台灣時間 00:00 = UTC 16:00 自動更新
  schedule:
    - cron: '0 16 * * *'
  # 推送到主分支時也重新部署(僅前端，不一定更新資料)
  push:
    branches: [main]
  # 允許手動觸發
  workflow_dispatch:

permissions:
  contents: write # 允許把快照/排名 commit 回 repo
  pages: write
  id-token: write

# 同時間只跑一個部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 取得原始碼
        uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安裝相依套件
        run: npm ci

      - name: 更新榜單資料(快照差異 / 冷啟動回退)
        # push 觸發時略過資料更新，只重新部署現有資料；排程與手動則更新。
        if: github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run update-rankings

      - name: 將更新後的快照與排名 commit 回 repo
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data public/data/rankings.json
          if git diff --staged --quiet; then
            echo "沒有資料變動，略過 commit。"
          else
            git commit -m "chore(data): 更新榜單快照 $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: 建置前端
        run: npm run build

      - name: 設定 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上傳 Pages 產物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
